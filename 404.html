<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exquisite Cars Zimbabwe</title>
    <script>
      // SPA deep-link shim: stash the requested path, then bounce to root.
      // main.jsx rehydrates the router via history.replaceState.
      try {
        sessionStorage.setItem(
          'exquisite:spa-redirect',
          window.location.pathname + window.location.search + window.location.hash
        );
      } catch (e) {}
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
